version: "3.8"

services:
  autoacmg:
    build:
      context: .
      dockerfile: Dockerfile
    image: autoacmg:latest
    ports:
      - "8000:8000"
    volumes:
      - autoacmg-cache:/root/.autoacmg/cache
      - ./data:/app/data:ro
    environment:
      - AUTOACMG_LOG_LEVEL=INFO
      - AUTOACMG_API_PORT=8000
    command: ["serve", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  autoacmg-cache:
    driver: local
